title: "O18 听见自己 · 女祭司"
subtitle: "5 分钟反 actionable 练习 · 什么都不做，等心里那句浮上来"
description: |
  今晚这一集，是给那个被太多声音淹没、听不见自己想要什么的你。

  你不是没有主见——你只是声音太多，听不见自己。

  家人或朋友问你想吃什么，你说"随便"。其实你想吃 X，但你怕他们说"又是 X"。你在两个 offer 之间反复刷小红书、Reddit，搜了 20 篇"怎么选"，越搜越不知道。你想说"我不想去"，但你听到自己说出口的是"好啊"。你刷到一条视频说"要爱自己"，你点头，转头又把好的留给别人。

  塔罗女祭司这张牌——一弯月亮、一卷合着的书、一汪静水——她不催你，她等你。她不是一个神秘的女性形象——她是你心里那个安静坐着等你说话的人。

  这一集我陪你做一个 3 分钟反 actionable 的小练习：什么都不做。不要问自己"我到底想要什么"——这个问题问出来，她就走远了。我们只是……坐着。慢慢呼吸。等一句话，不去找它，让它自己浮上来。

  如果今晚没有句子浮上来，也没关系。她在那里，明天她还在。

  心里的那个声音一直在。你不强迫她，她会说话。

  5 分钟心灵护身电台，配古琴 + 水晶钵 + 静水环境音。

  —— 星泽 O18 心灵护身 ——

  本集是心灵护身，不是占卜预测。
