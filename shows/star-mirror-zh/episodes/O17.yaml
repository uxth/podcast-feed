title: "O17 把今天放下来的练习"
subtitle: "7 分钟夜间反刍安抚仪式 · 装篮子 + 上梯子"
description: |
  今晚这一集，是给那个躺下来了，可脑子还在"回放今天"的你。

  你不是在想太多——你只是还没找到放下的方法。

  你又把今天那场对话回放了第三遍，第三遍里你想了一个更好的回答。你想起一件三个月前的尴尬事，然后翻身。你打开手机想看时间，结果滑了 5 分钟。你告诉自己"别想了"，然后立刻又开始想"我怎么又开始想了"。

  这是夜里反刍。不需要被诊断，也不需要被分析——它只需要被命名，然后被装进篮子里。

  这一集我陪你做一个 5 分钟的小练习——不是冥想，是一个具体的心象动作。

  • 装篮子：想象床边有一个小篮子，今天发生的所有事——那场对话、那条没回的消息、那件没做完的事——一件一件慢慢放进去。今天可以就放在那里了，不用今天就解决完，篮子会替你看着的。
  • 上梯子：篮子在地上安静地放着，你转过身，前面有一个软软的梯子，三级——一级是身体放下，二级是肩膀放下，三级是眼睛放下。一级，一级，慢慢上去。梯子的尽头是你的枕头。

  无论今天多重，你都值得睡一个被装下来的觉。

  7 分钟心灵护身电台，配古琴 + 水晶钵 + 温柔环境音。

  —— 星泽 O17 心灵护身 ——

  本集是心灵护身，不是占卜预测。
  本集采用 AI 辅助制作。
