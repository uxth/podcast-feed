episode_id: O24
slug: pisces-feelings-are-not-failures
title: "O24 双鱼座 · 情绪不是失败 — 你不需要为「感受太多」道歉"
subtitle: "9 分钟心灵镜照 · 这场雨会停"
description: |
  夜里好。今晚我想先跟你说一件事。

  是不是有那么一刻，今天，你难过了一下。然后，几乎是立刻——你又难过了一次。不是因为又发生了什么新的事，而是——因为你又难过了。

  如果是这样，那么这一集，就是给你的。

  我是星泽，今晚陪你坐一会儿。今晚我不打算分析你的性格，也不打算给你建议，也不打算告诉你"应该怎么办"。

  今晚我只想直接跟你说一件事：你的情绪不是要被治好的病，也不是要被仰望的天赋。它就是它。它是真实的，它会过去。

  这张牌不是要你必须坚强。它也不是要你必须做一个梦想家。它更不是要你为眼泪羞愧。

  我猜你这会儿，大概是这样的——今天下午，你看到一个新闻，关于一只没人要的流浪猫。你心里堵了，一直堵到了晚上。你想跟人说，但是你想"这有什么大不了的，别人不会觉得我矫情吗"。所以你没说。然后你又想"我是不是又太多事了"。

  一只流浪猫的新闻，堵了你一整天。然后你又因为"被堵了一整天"，自责了一整天。

  这不是你软弱。这不是你玻璃心。这不是你太情绪化。这也不是因为你"是双鱼，所以注定如此"。

  这是——你的感受器比大多数更敏感一些。它把别人没注意到的事，都接收了。它不是缺陷，它也不是天赋。它就是它。

  情绪不是要被治好的病，也不是要被仰望的天赋。它就是它。

  跟我一起，慢慢呼吸。把那句"我又这样了"，先放下来一会儿。

  现在，跟我一起，在心里——只说一遍——「这场雨会停」。

  你不是太多事。你不是矫情。你不是没放下。你是——在下一阵雨。你是——在让它下完。

  明天，那只流浪猫可能又会让你堵一整天——也没关系。你可能又会说一句"我又这样了"——也没关系。

  但是今晚——你没有再为"我又这样了"骂自己一次。

  这是今晚星泽给你的一次心灵镜照。它不预言你何时能"放下"。它认领你今晚还在心里的那场雨。

  无论那场雨是什么——一只流浪猫，一通电话，一部电影，一句八年前的话——它是真实的，它会过去。

  晚安。今晚陪你听这场雨。

  —— 星泽 O24 情绪不是失败 ——

  本集是心灵护身，不是占卜预测。
  如果"又难过了"持续好几个月让你失眠焦虑、无法正常生活，请咨询专业医生。
