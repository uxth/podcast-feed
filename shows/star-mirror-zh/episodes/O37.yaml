title: "O37 凌晨三点睁着眼的你"
subtitle: "7 分钟心灵护身电台 · 今晚我不催你睡"
description: |
  晚上好——如果这还算晚上的话。

  你也没睡着，对吗？我知道，我也醒着。

  这一集，今晚我不催你睡。

  这不是助眠音频，也不是冥想引导。我只是来陪你坐一会儿。

  失眠不等于失败。凌晨三点睁着眼，不是你身体哪里坏了，是你身体里有一颗小气泡——它今夜暂时没有沉下去。这一夜，也是日子。

  今晚我陪你做三件小事——
  · 看一眼床头那杯水里的小气泡——它没在赶时间，你也不用
  · 想三件还醒着的小东西——远处那盏没关的灯、冰箱的嗡嗡声、窗外一只夜行的鸟——任何三件都行
  · 跟自己说："这一夜也是日子。我不用力等天亮。"

  你不需要赶天亮，也不需要骂自己睡不着。你只是和这一颗小气泡，一起，等。

  如果这一夜的清醒让你越来越难受，或者已经持续好几个晚上让你撑不住——请去找一个真正能帮你的人。可能是医生，可能是朋友，可能是热线。北京回龙观医院心理援助热线，010-82951332。全国心理援助热线，400-161-9995。

  本集是心灵护身，不是占卜预测，也不是治疗，是陪伴。
  本集采用 AI 辅助制作。
  反馈：dingqing1981@gmail.com

  —— 星泽 O37 凌晨三点睁着眼的你 ——
