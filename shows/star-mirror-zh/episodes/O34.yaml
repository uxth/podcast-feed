title: "O34 塔 · 突破 · 塌的不是你"
subtitle: "7 分钟心灵镜照 · 你还在地上"
description: |
  早上醒来——你又一次想起来：那件事真的发生了，对吗？

  今晚我想给你看一张牌——这张牌的名字有点重，我更想叫它"突破"。但今晚我不想说"重生"，我只想说：你还在。

  这不是占卜，也不是性格分析。这是一次心灵镜照。塌的不是你——是那个支撑。你还在地上。

  早上醒来的那 5 秒钟你忘记了——然后你想起来。那件事真的发生了。

  你刷牙的时候盯着镜子里的自己——你不认识他/她。但他/她还在刷牙。

  有人发消息问你"还好吗"。你打了三遍"还好"，最后只回了一个"嗯"。

  你忽然意识到，那件事发生之后，你已经吃了 9 顿饭了。9 顿饭。你都不记得是什么饭，但你确实吃了。

  那件事是真的塌了。我们今晚不假装它没发生，也不催你重建。我们只先看一看——你现在还在哪里。

  今晚陪你做一件小事——不用想"怎么办"，不用想"下一步"。只是看一看你现在的位置——你坐在哪里？椅子是软的还是硬的？你的脚踩在地上吗？你的手放在哪里？你的呼吸是深还是浅？

  你现在所在的这个位置，是真实的。它不是塌了的那部分。

  那件事是真的塌了——但你正在的这个位置，是你的。它没塌。

  现在跟我一起说三遍——在心里说就行：『它塌了——就让它塌着。我不必现在就把它捡起来。』一遍……两遍……三遍……。

  今天你不用想明天的事。今天的任务只是：吃饭。睡觉。还在地上。

  明天你可能还是不知道接下来做什么——也不用知道。突破不是一夜之间想通——它是 9 顿饭、20 杯水、5 个晚上一觉醒来发现你还在地上。慢慢来。

  这一集是陪伴，不是治疗——如果你已经一周以上吃不下饭睡不着觉，或者觉得"活着没意思"——请去找一个真正能帮你的人。你不丢人，这只是另一种"还在地上"的方式。

  这是今晚星泽给你的一次心灵镜照——它不预言你的明天，它认领你的今晚还在。

  —— 星泽 O34 塌的不是你 ——

  本集是心灵护身，不是占卜预测。
