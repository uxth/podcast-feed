title: "O38 被一句话戳到的那天"
subtitle: "7 分钟心灵护身电台 · 被否定后的自我修复"
description: |
  今晚，把一张便利贴和你的手心放在一起。

  你有没有过那样一天——别人说了一句话，可能只是随口的，可你脑子里那一句话开始反反复复转——一边洗碗一边转，一边睡觉一边转，一边走路一边转。

  你心里有一个"否定者"。它不全是真的——但它现在就在那里，挡不走。

  这一集不是占卜，也不是性格分析。我也不带你做冥想，也不带你做正念。我就陪你做三件事——

  · 把那句话写在便利贴上，放到桌子的边角——不是赶它走，是把它请到外面
  · 想三件今天做过的小事——关了一盏灯、回了朋友一条信息、洗了一只碗、听完这一集——任何三件都行
  · 摊开手心，把这三件小事放进去。然后跟那句话说："你是真的，但你不是我的全部。"

  你不需要打败它，也不需要假装它不在。你只是把它放在便利贴上——它和你共存。

  如果脑子里的那句话已经几天几夜转不停，或者让你开始想"是不是消失就好了"——请马上去找真正能帮你的人。可以是医生，可以是朋友，可以是热线。北京回龙观医院心理援助热线，010-82951332。全国心理援助热线，400-161-9995。这一点都不丢人——它是你手心里的第四件小事。

  本集是心灵护身，不是占卜预测，不是治疗，是陪伴。
  本集采用 AI 辅助制作。
  反馈：dingqing1981@gmail.com

  —— 星泽 O38 被一句话戳到的那天 ——
