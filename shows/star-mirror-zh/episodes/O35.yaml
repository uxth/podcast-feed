slug: the-sun-just-be-happy
title: "O35 太阳牌 · 你可以就这么开心"
subtitle: "6 分钟心灵镜照 · 你不必为高兴辩护"
description: |
  今晚我想给你看一张牌——太阳。但我不想跟你说"阳光照进生活"那种话。我想说——你可以就这么开心。

  这一集，不是占卜，也不是性格分析。它是一次心灵镜照——你不必为高兴辩护。

  你今天，有没有不小心开心了一下？然后立刻——在心里把它收回去？

  你看到一只猫，蜷在窗台上晒太阳。你笑了一下。然后你立刻想——这有什么好笑的。

  同事说了一句莫名其妙的话你觉得很好笑——你想发到群里，又删了。怕别人觉得你幼稚。

  你点了一杯没必要的奶茶，第一口的时候你心里说："嗯，挺好的。"然后下一秒："我是不是又乱花钱了。"

  天气好得很，你想出去走走——但你又坐回去打开电脑："我应该工作的。"

  这不是你不配开心——是有人很久以前告诉你"高兴是要付代价的"，然后你信了。今晚我只想说——这次不用。

  今晚我陪你做两件小事——
  · 回想今天那个让你嘴角动了一下的小事，不用判断它值不值得开心
  · 把那个小小的开心，轻轻放进你心里的口袋里。不用反复确认，不用拍照存档

  它发生了，它就够了。快乐不需要存档。

  太阳牌不是承诺你以后会一直开心。它是说：你已经开心过了。今晚不要把那一次收回来。

  这是今晚星泽给你的一次心灵镜照——它不预言你的明天，它认领你的今天。

  谢谢这一阵风。

  —— 星泽 O35 你可以就这么开心 ——

  本集是心灵护身，不是占卜预测。
