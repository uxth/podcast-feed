title: "N03 Rainy Night Train - The Late Autumn Carriage"
subtitle: "10 min guided sleep meditation"
description: |
  Tonight we board a slow night train in late autumn rain.

  You sit alone in the carriage.
  Warm yellow lamps. A few sleeping passengers. Outside, rain streaks down the glass and turns every light into a soft orange halo.
  The wheels tap softly on the rails — "tak-tak — tak-tak —"
  The wiper at the front sweeps once, then again, slowly.

  You lean against the window, draw your coat over your legs, and let the day fall behind you.
  Outside is a wet black field. Now and then a lonely distant house flashes by, and the rain erases it again.
  Your breath slows with the rhythm of the wheels — slower, slower —
  until only the rain remains, the wheels, and you.

  10 minutes of guided sleep meditation, with original guqin lofi piano + rain ambient + train wheel rhythm.
  Best listened to in bed, just before falling asleep.

  —— Night Refuge N03 ——

