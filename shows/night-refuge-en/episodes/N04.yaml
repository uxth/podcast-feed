subtitle: "10 min guided sleep meditation"
description: |
  Tonight we lie down together on a vast highland grassland, under a midsummer night sky.

  You walk slowly to the middle of the meadow, sit down, then slowly lie back.
  The cool grass holds your back. Above you, the sky is deep — deep enough that the Milky Way pours across it like a soft silver ribbon, flowing from one edge of the world to the other.
  Countless stars hover in stillness. Some bright, some so faint they're almost a thought. Somewhere — very, very far — a small orange campfire flickers, like a low-hanging star, left by some other night traveler.

  Around you, the summer crickets chorus rises and falls, layer upon layer, like a small invisible ocean.
  A breeze walks slowly across the grass tips, carrying the scent of green grass, cool earth, and a faint trace of distant woodsmoke.
  You rest your hands on your chest, and let the sky and the grass hold you at the same time.
  Your breath slows with the rhythm of the crickets — slower, slower —
  until only the stars remain, the crickets, and you.

  10 minutes of guided sleep meditation, with original guqin lofi piano + cricket ambient + distant campfire crackle.
  Best listened to in bed, just before falling asleep.

  —— Night Refuge N04 ——

