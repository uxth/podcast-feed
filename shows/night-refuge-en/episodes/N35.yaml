title: "N35 Gobi Camel Bell Night · The Gobi Glows Beneath the Moon"
subtitle: "12-minute sleep meditation · You don't have to make conditions perfect to sleep"
description: |
  Lying down again — tightening up again with that thought: "I have to make everything perfect before I can sleep"?

  The bed isn't quite soft enough. There's a faint noise outside. The blanket corner isn't tucked. One last message unanswered. One thing tomorrow not yet thought through. You tell yourself — once all this is sorted, then I'll sleep.

  Tonight I want to take you somewhere far away — **not a desert, a gobi**. The ground is half pebble, half sand — sun-baked by day, cooling by night — **the particular cool of pebbles** — hard and refreshing — like holding a cool stone in the night, that "specific" cool.

  Almost no grass on the gobi — just a few low clumps of camel thorn far off — grown for decades — **already used to nights without water**. The moon tonight — nearly full — just shy of round — reflects up from the gobi surface, casting the whole plain in a thin sheet of silver. This reflection has a name — **sand-moon** — the gobi itself a little brighter than the moon alone — as if the gobi glows back.

  Far, far away — a night-traveling camel caravan — already at rest — just standing — **they don't need a shelter** — just standing — ruminating — or lowering their heads — eyes slowly closing.

  Old copper bells hang from their necks — large bells — larger than reindeer bells or cow bells — because camels walk long roads, the bells must too. Now and then a camel's head shifts — bell — **"dong — — dong" — two strokes** — first sound + 0.5 second + second sound — because the head moves, the bell swings, returns, swings once more, comes to rest — so it's two strokes.

  Tonight you don't have to make conditions perfect to sleep. **The gobi reflects = what has been lit can reflect. Camels need no shelter = you don't need perfection. Two-stroke bell = thought + echo. Hard pebble-cool = hard facts can support you too**.

  You too — can lean back — and sleep. **Good — night**.

