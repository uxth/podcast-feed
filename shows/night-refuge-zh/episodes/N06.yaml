subtitle: "8 分钟引导式助眠 · 冬夜旧书房 + 纸页与雪"
description: |
  今晚我们一起到一间冬夜的旧书房里去。

  屋外是漫天慢慢落下的雪，屋里是一盏低垂的台灯，桌上一本翻开的旧书。
  你慢慢走到那张木椅边，慢慢地坐下去。椅子接住了你，桌子接住了你的两只手，灯光接住了你的目光。
  你翻过一页——沙——纸轻轻响一下。又翻过一页——沙——再轻一下。
  灯，还亮着。雪，还在落。
  你听见自己的呼吸跟着翻页的节奏，越来越慢，越来越柔。
  到最后，纸停在了某一页上，你的头也悄悄地靠到了椅背上。

  8 分钟的引导式助眠，配古琴 lofi 钢琴 + 纸页翻动 + 远处雪夜环境音。
  适合上床后听，让大脑跟着翻页声慢慢停下来。

  —— 夜栖 N06 ——

