subtitle: "11 分钟引导式助眠"
description: |
  今晚我们一起搭一列雨夜的夜班绿皮火车。

  深秋,你独自坐在车厢里。
  暖黄色的小灯,几个已经睡着的乘客,窗外斜流的雨水把所有灯光化成柔软的橙色光晕。
  车轮在铁轨上低低地敲——「咔嗒——咔嗒——」。
  雨刮在前方一下,又一下,慢慢地划过。

  你靠在窗边,把外套盖在腿上,把白天放在身后。
  窗外是湿润的黑色田野,偶尔闪过一座孤独的远屋,又被雨水抹去。
  你的呼吸跟着车轮的节奏慢下来,越来越慢——
  最后只剩下雨声、车轮声,和你自己。

  11 分钟的引导式助眠,配古琴 lofi 钢琴 + 雨声 + 火车轮声。
  适合上床后听,让大脑慢慢停下来。

  —— 夜栖 N03 ——

