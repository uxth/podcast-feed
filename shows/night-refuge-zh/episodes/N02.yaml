description: |
  今晚我们去山里的一汪小潭。

  月光透过松针，淡淡地落下。
  潭面几乎不动，只有偶尔一片树叶飘下来，轻轻荡开一圈涟漪。
  一阵凉风吹过，带着苔藓和湿土的气息。

  坐到潭边。让水里的倒影慢慢静下来。让你的思绪也跟着静下来。

  8 分钟的引导式助眠，配古琴 lofi 钢琴 + 森林环境音。
  适合上床后听。

  —— 夜栖 N02 ——

