name: Rebuild RSS Feeds + Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'shows/**/show.yaml'
      - 'shows/**/episodes/*.yaml'
      - 'shows/**/episodes/*.mp3'
      - 'gen_rss.py'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg + pyyaml
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install pyyaml

      - name: Generate all RSS feeds
        env:
          PODCAST_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python3 gen_rss.py --all

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Commit updated feed.xml back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shows/*/feed.xml
          if git diff --staged --quiet; then
            echo "No feed.xml changes to commit"
          else
            git commit -m "chore(feeds): auto-regenerate RSS feeds [skip ci]"
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
