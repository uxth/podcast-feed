name: Rebuild RSS Feeds + Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'shows/**/show.yaml'
      - 'shows/**/episodes/*.yaml'
      - 'shows/**/episodes/*.mp3'
      - 'shows/**/cover.jpg'
      - 'gen_rss.py'
      - '.github/workflows/rebuild-feeds.yml'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要历史以便 commit feed.xml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Generate all RSS feeds
        env:
          PODCAST_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python3 gen_rss.py --all

      - name: Commit updated feed.xml back to main (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shows/*/feed.xml
          if git diff --staged --quiet; then
            echo "No feed.xml changes to commit"
            exit 0
          fi
          git commit -m "chore(feeds): auto-regenerate RSS feeds [skip ci]"
          # v15 retry 3 次防 race condition (用户连续 push 会撞)
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retry in 5s..."
            sleep 5
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
